{% load i18n %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kea Survey</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f5; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#1f2937;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px; background-color:#ffffff; border-radius:8px; overflow:hidden; border:1px solid #e5e7eb;">
          <tr>
            <td style="background-color:#343a40; padding:24px 32px;">
              <span style="color:#ffffff; font-size:20px; font-weight:700; letter-spacing:0.5px;">Kea Survey</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              {% block content %}{% endblock content %}
            </td>
          </tr>
          <tr>
            <td style="padding:24px 32px; background-color:#fafafa; border-top:1px solid #e5e7eb;">
              <p style="margin:0; font-size:13px; line-height:1.5; color:#6b7280;">
                {% trans "Thank you for using Kea Survey." %}<br>
                <a href="https://keasurvey.nz" style="color:#6b7280;">keasurvey.nz</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
